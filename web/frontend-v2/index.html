<!DOCTYPE html>
<html lang="en" data-theme="warp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>CloudTerm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ct-theme');
          if (t) {
            var d = JSON.parse(t);
            if (d && d.state && d.state.theme) {
              document.documentElement.setAttribute('data-theme', d.state.theme);
            }
          }
        } catch (_) {}
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/guacamole/guacamole-common.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
